pipeline:
  name: "stesting "
  identifier: stesting
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: rn
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    connectorRef: dockerconnector
                    image: ubuntu
                    shell: Sh
                    command: |-
                      ls -l 
                      cd frontend/
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: rnc
                    repo: sarocky/3tier-frontend
                    tags:
                      - latest
                    dockerfile: frontend/Dockerfile
                    context: frontend
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_2
                  identifier: BuildAndPushDockerRegistry_2
                  spec:
                    connectorRef: rnc
                    repo: sarocky/3tier-backend
                    tags:
                      - latest
                    dockerfile: backend/Dockerfile
                    context: backend
                    resources:
                      limits:
                        memory: 4G
                        cpu: "1"
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: d
              namespace: test
              automountServiceAccountToken: true
              nodeSelector: {}
              harnessImageConnectorRef: dockerconnector
              os: Linux
    - stage:
        name: deploy
        identifier: deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: de
            gitBranch: main
          environment:
            environmentRef: t12
            deployToAll: false
            infrastructureDefinitions:
              - identifier: dev
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
